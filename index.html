<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="كايا">
    <title>كايا هوتيل</title>
    
    <!-- الخطوط والمكتبات -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg: #070d1a;
            --bg2: #0b1220;
            --gold: #c8a96e;
            --text: #ffffff;
            --text-dim: #8e99ab;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            padding-bottom: 80px; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* الهيدر */
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg2);
        }

        /* الرسوم البيانية */
        .chart-container {
            padding: 20px;
            background: var(--bg2);
            margin: 15px;
            border-radius: 15px;
        }

        /* قائمة الحجوزات */
        .bookings-section { padding: 0 20px; }
        .booking-card {
            background: var(--bg2);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 4px solid var(--gold);
        }

        /* نافذة الإضافة (Sheet) */
        .sheet-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; z-index: 1000;
        }
        .sheet-box {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            background: var(--bg2); border-radius: 20px 20px 0 0;
            padding: 30px 20px; transition: 0.4s; z-index: 1001;
        }
        .sheet-box.active { bottom: 0; }
        
        input, select, button {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border-radius: 8px; border: 1px solid #1a2235;
            background: #070d1a; color: white;
        }
        
        .btn-add {
            background: var(--gold); color: black; font-weight: bold; border: none;
        }

        /* شريط التنقل السفلي */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: var(--bg2); display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid #1a2235;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { color: var(--text-dim); text-align: center; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

    <div class="header">
        <h2>لوحة التحكم</h2>
        <button onclick="openSheet()" style="width: auto; padding: 5px 15px; margin: 0;">+ حجز جديد</button>
    </div>

    <!-- قسم الرسم البياني -->
    <div class="chart-container">
        <h4 style="margin-bottom: 15px;">أداء العوائد المالي</h4>
        <canvas id="performanceChart"></canvas>
    </div>

    <!-- قائمة الحجوزات -->
    <div class="bookings-section">
        <h4 style="margin-bottom: 10px;">آخر الحجوزات</h4>
        <div id="bookingsList">
            <!-- سيتم إضافة الحجوزات هنا برمجياً -->
        </div>
    </div>

    <!-- نافذة إضافة حجز -->
    <div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>
    <div class="sheet-box" id="sheet">
        <h3 style="margin-bottom: 20px;">إضافة حجز جديد</h3>
        <form id="bookingForm">
            <input type="text" id="guestName" placeholder="اسم الضيف" required>
            <input type="number" id="amount" placeholder="المبلغ (ريال)" required>
            <select id="source">
                <option value="Airbnb">Airbnb</option>
                <option value="Gathern">جاذر إن</option>
                <option value="Direct">حجز مباشر</option>
            </select>
            <button type="submit" class="btn-add">تأكيد الحجز</button>
        </form>
    </div>

    <!-- شريط التنقل السفلي -->
    <div class="nav-bar">
        <div class="nav-item active">الرئيسية</div>
        <div class="nav-item">التقويم</div>
        <div class="nav-item">العقارات</div>
        <div class="nav-item">الإعدادات</div>
    </div>

    <script>
        // 1. إدارة البيانات وحفظها في المتصفح
        const BookingManager = {
            data: JSON.parse(localStorage.getItem('kaya_bookings') || '[]'),
            save(booking) {
                this.data.unshift(booking);
                localStorage.setItem('kaya_bookings', JSON.stringify(this.data));
                this.render();
                updateChart();
            },
            render() {
                const list = document.getElementById('bookingsList');
                list.innerHTML = this.data.map(b => `
                    <div class="booking-card">
                        <div>
                            <strong>${b.guestName}</strong><br>
                            <small style="color: var(--text-dim)">${b.source} • ${b.date}</small>
                        </div>
                        <div style="color: var(--gold); font-weight: bold;">${b.amount} ريال</div>
                    </div>
                `).join('');
            }
        };

        // 2. إدارة الرسم البياني
        let myChart;
        function initChart() {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['الأسبوع 1', 'الأسبوع 2', 'الأسبوع 3', 'الأسبوع 4'],
                    datasets: [{
                        label: 'العوائد',
                        data: [5000, 8000, 4000, 12000],
                        borderColor: '#c8a96e',
                        backgroundColor: 'rgba(200, 169, 110, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { 
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { display: false }, x: { grid: { display: false } } }
                }
            });
        }

        function updateChart() {
            // محاكاة تحديث الرسم البياني بناءً على البيانات الجديدة
            myChart.data.datasets[0].data.push(Math.floor(Math.random() * 5000) + 5000);
            if(myChart.data.datasets[0].data.length > 6) myChart.data.datasets[0].data.shift();
            myChart.update();
        }

        // 3. التحكم في النوافذ
        function openSheet() {
            document.getElementById('overlay').style.display = 'block';
            setTimeout(() => document.getElementById('sheet').classList.add('active'), 10);
        }

        function closeSheet() {
            document.getElementById('sheet').classList.remove('active');
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 400);
        }

        // 4. تشغيل عند البدء
        document.getElementById('bookingForm').onsubmit = (e) => {
            e.preventDefault();
            const newBooking = {
                guestName: document.getElementById('guestName').value,
                amount: document.getElementById('amount').value,
                source: document.getElementById('source').value,
                date: new Date().toLocaleDateString('ar-SA')
            };
            BookingManager.save(newBooking);
            closeSheet();
            e.target.reset();
        };

        window.onload = () => {
            BookingManager.render();
            initChart();
        };
    </script>
</body>
</html>
